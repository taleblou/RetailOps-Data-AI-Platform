version: 2

sources:
  - name: raw
    description: Raw ingestion layer populated by connector modules.
    schema: raw
    tables:
      - name: orders
        description: Raw orders table loaded from connectors.
        loaded_at_field: ingested_at
        freshness:
          warn_after: {count: 12, period: hour}
          error_after: {count: 24, period: hour}
      - name: products
        description: Raw products table loaded from connectors.
        loaded_at_field: ingested_at
        freshness:
          warn_after: {count: 1, period: day}
          error_after: {count: 2, period: day}
      - name: shipments
        description: Raw shipments table loaded from connectors.
        loaded_at_field: ingested_at
        freshness:
          warn_after: {count: 12, period: hour}
          error_after: {count: 24, period: hour}
      - name: inventory_snapshots
        description: Raw inventory snapshots table loaded from connectors.
        loaded_at_field: ingested_at
        freshness:
          warn_after: {count: 12, period: hour}
          error_after: {count: 24, period: hour}
