services:
  connector_adobe_commerce:
    build:
      context: ..
      dockerfile: modules/connector_adobe_commerce/Dockerfile
    container_name: retailops-connector-adobe-commerce
    env_file:
      - ../.env
    volumes:
      - connector_adobe_commerce_data:/app/data
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "uv run python -c 'import modules.connector_adobe_commerce.connector; print(\"connector-adobe-commerce-ok\")'"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - retailops_net

volumes:
  connector_adobe_commerce_data:

networks:
  retailops_net:
    driver: bridge
