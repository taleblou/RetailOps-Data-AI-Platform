services:
  connector_bigcommerce:
    build:
      context: ..
      dockerfile: modules/connector_bigcommerce/Dockerfile
    container_name: retailops-connector-bigcommerce
    env_file:
      - ../.env
    volumes:
      - connector_bigcommerce_data:/app/data
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "uv run python -c 'import modules.connector_bigcommerce.connector; print(\"connector-bigcommerce-ok\")'"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - retailops_net

volumes:
  connector_bigcommerce_data:

networks:
  retailops_net:
    driver: bridge
