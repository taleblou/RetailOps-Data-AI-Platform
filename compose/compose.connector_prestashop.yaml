services:
  connector_prestashop:
    build:
      context: ..
      dockerfile: modules/connector_prestashop/Dockerfile
    container_name: retailops-connector-prestashop
    env_file:
      - ../.env
    volumes:
      - connector_prestashop_data:/app/data
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "uv run python -c 'import modules.connector_prestashop.connector; print(\"connector-prestashop-ok\")'"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - retailops_net

volumes:
  connector_prestashop_data:

networks:
  retailops_net:
    driver: bridge
