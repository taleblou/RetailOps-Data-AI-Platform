services:
  trino:
    image: trinodb/trino:460
    container_name: retailops-trino
    ports:
      - "${TRINO_PORT:-8088}:8080"
    volumes:
      - ../modules/query_layer/config/catalogs:/etc/trino/catalog:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/v1/info || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
    networks:
      - retailops_net

  query_layer:
    build:
      context: ..
      dockerfile: modules/query_layer/Dockerfile
    container_name: retailops-query-layer
    env_file:
      - ../.env
    depends_on:
      trino:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "print('query-layer-ok')"
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - retailops_net

networks:
  retailops_net:
    driver: bridge
