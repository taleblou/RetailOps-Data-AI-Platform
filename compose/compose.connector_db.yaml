services:
  connector_db:
    build:
      context: ..
      dockerfile: modules/connector_db/Dockerfile
    container_name: retailops-connector-db
    env_file:
      - ../.env
    volumes:
      - connector_db_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "uv run python -c 'import modules.connector_db.connector; print(\"connector-db-ok\")'"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - retailops_net

volumes:
  connector_db_data:

networks:
  retailops_net:
    driver: bridge
