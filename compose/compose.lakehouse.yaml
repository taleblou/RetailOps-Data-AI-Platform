services:
  lakehouse:
    build:
      context: ..
      dockerfile: modules/lakehouse/Dockerfile
    container_name: retailops-lakehouse
    env_file:
      - ../.env
    volumes:
      - lakehouse_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'print(\"lakehouse-ok\")'"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - retailops_net

volumes:
  lakehouse_data:

networks:
  retailops_net:
    driver: bridge
