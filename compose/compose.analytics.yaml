services:
  metabase:
    image: metabase/metabase:latest
    container_name: retailops-metabase
    env_file:
      - ../.env
    ports:
      - "${METABASE_PORT:-3000}:3000"
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 15
    networks:
      - retailops_net

  analytics:
    build:
      context: ..
      dockerfile: modules/analytics_kpi/Dockerfile
    container_name: retailops-analytics
    env_file:
      - ../.env
    volumes:
      - analytics_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'print(\"analytics-ok\")'"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - retailops_net

volumes:
  analytics_data:
  metabase_data:

networks:
  retailops_net:
    driver: bridge
