services:
  redis:
    image: redis:7
    container_name: retailops-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 20s
      timeout: 5s
      retries: 10
    networks:
      - retailops_net

  feature_store:
    build:
      context: ..
      dockerfile: modules/feature_store/Dockerfile
    container_name: retailops-feature-store
    env_file:
      - ../.env
    volumes:
      - feature_store_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "print('feature-store-ok')"
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - retailops_net

volumes:
  feature_store_data:

networks:
  retailops_net:
    driver: bridge
