services:
  forecasting:
    build:
      context: ..
      dockerfile: modules/forecasting/Dockerfile
    container_name: retailops-forecasting
    env_file:
      - ../.env
    volumes:
      - forecasting_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'print(\"forecasting-ok\")'"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - retailops_net

volumes:
  forecasting_data:

networks:
  retailops_net:
    driver: bridge
