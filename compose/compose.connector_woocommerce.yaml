services:
  connector_woocommerce:
    build:
      context: ..
      dockerfile: modules/connector_woocommerce/Dockerfile
    container_name: retailops-connector-woocommerce
    env_file:
      - ../.env
    volumes:
      - connector_woocommerce_data:/app/data
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "uv run python -c 'import modules.connector_woocommerce.connector; print(\"connector-woocommerce-ok\")'"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - retailops_net

volumes:
  connector_woocommerce_data:

networks:
  retailops_net:
    driver: bridge
