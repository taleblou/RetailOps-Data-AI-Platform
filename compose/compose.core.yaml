services:
  postgres:
    image: postgres:16
    container_name: retailops-postgres
    env_file:
      - ../.env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - retailops_net

  api:
    build:
      context: ..
      dockerfile: core/api/Dockerfile
    container_name: retailops-api
    env_file:
      - ../.env
    ports:
      - "${API_PORT}:8000"
    volumes:
      - ../data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'python -c "import urllib.request; urllib.request.urlopen("http://localhost:8000/health")"']
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - retailops_net

  worker:
    build:
      context: ..
      dockerfile: core/worker/Dockerfile
    container_name: retailops-worker
    env_file:
      - ../.env
    volumes:
      - worker_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'python -c "print("worker-ok")"']
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - retailops_net

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.22.1
    container_name: retailops-mlflow
    env_file:
      - ../.env
    ports:
      - "${MLFLOW_PORT}:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
    volumes:
      - mlflow_data:/mlflow
    healthcheck:
      test: ['CMD-SHELL', 'python -c "import urllib.request; urllib.request.urlopen("http://localhost:5000")"']
      interval: 20s
      timeout: 10s
      retries: 10
    networks:
      - retailops_net

  metabase:
    image: metabase/metabase:latest
    container_name: retailops-metabase
    env_file:
      - ../.env
    ports:
      - "${METABASE_PORT}:3000"
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O /dev/null http://localhost:3000/api/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 15
    networks:
      - retailops_net

volumes:
  postgres_data:
  worker_data:
  mlflow_data:
  metabase_data:

networks:
  retailops_net:
    driver: bridge
