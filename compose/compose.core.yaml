services:
  postgres:
    image: postgres:16
    container_name: retailops-postgres
    env_file:
      - ../.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-retailops}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - retailops_net

  api:
    build:
      context: ..
      dockerfile: core/api/Dockerfile
    container_name: retailops-api
    env_file:
      - ../.env
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ../data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")'"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - retailops_net

  worker:
    build:
      context: ..
      dockerfile: core/worker/Dockerfile
    container_name: retailops-worker
    env_file:
      - ../.env
    volumes:
      - worker_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'print(\"worker-ok\")'"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - retailops_net


volumes:
  postgres_data:
  worker_data:

networks:
  retailops_net:
    driver: bridge
