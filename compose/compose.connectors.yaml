services:
  connector_csv:
    build:
      context: ..
      dockerfile: modules/connector_csv/Dockerfile
    container_name: retailops-connector-csv
    env_file:
      - ../.env
    volumes:
      - connector_csv_data:/app/data
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "uv run python -c 'import modules.connector_csv.connector; print(\"connector-csv-ok\")'"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - retailops_net

  connector_db:
    build:
      context: ..
      dockerfile: modules/connector_db/Dockerfile
    container_name: retailops-connector-db
    env_file:
      - ../.env
    volumes:
      - connector_db_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "uv run python -c 'import modules.connector_db.connector; print(\"connector-db-ok\")'"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - retailops_net

  connector_shopify:
    build:
      context: ..
      dockerfile: modules/connector_shopify/Dockerfile
    container_name: retailops-connector-shopify
    env_file:
      - ../.env
    volumes:
      - connector_shopify_data:/app/data
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "uv run python -c 'import modules.connector_shopify.connector; print(\"connector-shopify-ok\")'"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - retailops_net

volumes:
  connector_csv_data:
  connector_db_data:
  connector_shopify_data:

networks:
  retailops_net:
    driver: bridge
