services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.8
    container_name: retailops-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
    ports:
      - "${REDPANDA_PORT:-9092}:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q Healthy"]
      interval: 20s
      timeout: 10s
      retries: 10
    networks:
      - retailops_net

  debezium_connect:
    image: debezium/connect:2.7
    container_name: retailops-debezium-connect
    environment:
      BOOTSTRAP_SERVERS: redpanda:9092
      GROUP_ID: retailops-debezium
      CONFIG_STORAGE_TOPIC: retailops-connect-configs
      OFFSET_STORAGE_TOPIC: retailops-connect-offsets
      STATUS_STORAGE_TOPIC: retailops-connect-status
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_REST_ADVERTISED_HOST_NAME: debezium_connect
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - "${DEBEZIUM_PORT:-8083}:8083"
    networks:
      - retailops_net

  cdc:
    build:
      context: ..
      dockerfile: modules/cdc/Dockerfile
    container_name: retailops-cdc
    env_file:
      - ../.env
    volumes:
      - cdc_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      debezium_connect:
        condition: service_started
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "print('cdc-ok')"
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - retailops_net

volumes:
  cdc_data:

networks:
  retailops_net:
    driver: bridge
