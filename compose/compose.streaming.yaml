services:
  streaming:
    build:
      context: ..
      dockerfile: modules/streaming/Dockerfile
    container_name: retailops-streaming
    env_file:
      - ../.env
    volumes:
      - streaming_data:/app/data
    depends_on:
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'print("streaming-ok")'"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - retailops_net

volumes:
  streaming_data:

networks:
  retailops_net:
    driver: bridge
