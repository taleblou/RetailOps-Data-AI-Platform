services:
  metadata:
    build:
      context: ..
      dockerfile: modules/metadata/Dockerfile
    container_name: retailops-metadata
    env_file:
      - ../.env
    volumes:
      - metadata_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'print(\"metadata-ok\")'"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - retailops_net

volumes:
  metadata_data:

networks:
  retailops_net:
    driver: bridge
