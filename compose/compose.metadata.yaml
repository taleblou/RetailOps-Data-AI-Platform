services:
  metadata_mysql:
    image: mysql:8
    container_name: retailops-metadata-mysql
    environment:
      MYSQL_ROOT_PASSWORD: openmetadata
      MYSQL_DATABASE: openmetadata_db
      MYSQL_USER: openmetadata_user
      MYSQL_PASSWORD: openmetadata_password
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -propenmetadata || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
    networks:
      - retailops_net

  metadata_elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: retailops-metadata-es
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
    networks:
      - retailops_net

  metadata:
    build:
      context: ..
      dockerfile: modules/metadata/Dockerfile
    container_name: retailops-metadata
    env_file:
      - ../.env
    volumes:
      - metadata_data:/app/data
    depends_on:
      api:
        condition: service_healthy
      metadata_mysql:
        condition: service_healthy
      metadata_elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'print("metadata-ok")'"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - retailops_net

volumes:
  metadata_data:

networks:
  retailops_net:
    driver: bridge
