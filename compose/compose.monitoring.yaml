services:
  monitoring:
    build:
      context: ..
      dockerfile: core/monitoring/Dockerfile
    container_name: retailops-monitoring
    env_file:
      - ../.env
    volumes:
      - monitoring_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'python -c "print("monitoring-ok")"']
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - retailops_net

volumes:
  monitoring_data:

networks:
  retailops_net:
    driver: bridge
